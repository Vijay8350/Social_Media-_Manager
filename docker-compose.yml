# Local development stack.
# Supabase is hosted (cloud), so this only runs Redis + the worker locally.
#
#   docker compose up redis        # just Redis (run web + worker on host)
#   docker compose up              # Redis + worker in containers
services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  worker:
    image: node:20-alpine
    working_dir: /app
    depends_on:
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      REDIS_URL: redis://redis:6379
    volumes:
      - ./:/app
    command: >
      sh -c "corepack enable &&
             pnpm install --frozen-lockfile=false &&
             pnpm --filter @insta/worker start"

volumes:
  redis-data:

# nginx reverse proxy for the Insta Post Generator web app.
# Place at /etc/nginx/sites-available/insta and symlink into sites-enabled,
# then run certbot to add TLS (it rewrites this file to add the 443 block).
#
#   sudo cp deploy/nginx.conf /etc/nginx/sites-available/insta
#   sudo ln -sf /etc/nginx/sites-available/insta /etc/nginx/sites-enabled/insta
#   sudo nginx -t && sudo systemctl reload nginx
#   sudo certbot --nginx -d social.apanjob.com

server {
    listen 80;
    listen [::]:80;
    server_name social.apanjob.com;

    # Proxy everything to the Next.js app (PM2: insta-web on :3200).
    # This is a standalone server block keyed by server_name, so it does NOT
    # affect other vhosts already on this nginx. Keep this port in sync with
    # WEB_PORT in the root .env.
    location / {
        proxy_pass http://127.0.0.1:3200;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
    }

    client_max_body_size 12M;  # headroom for generated-image uploads
}
